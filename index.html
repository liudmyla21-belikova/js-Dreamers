<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/js_dreamers/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booksy</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
      integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/js_dreamers/index.js"></script>
    <link rel="stylesheet" crossorigin href="/js_dreamers/assets/index-jJYoEV9Q.css">
  </head>
  <body>
    <button id="open-contact-modal-btn">Open Register Modal</button>
    

    
    <main>
      
      
      
      
      
      <div id="contact-modal" class="contact-modal is-hidden" role="dialog" aria-modal="true">
    <div class="contact-modal-content">
      <button class="contact-modal-close" aria-label="Close modal">&times;</button>
      <h2 class="contact-modal-title">Register</h2>
      <p class="contact-modal-subtitle">Cozy Book Club — "The Midnight Library"</p>
      <form id="contact-modal-form" class="contact-modal-form">
        <label class="contact-modal-label">
          Name*
          <input type="text" name="name" required class="contact-modal-input" />
        </label>
        <label class="contact-modal-label">
          Email*
          <input type="email" name="email" required class="contact-modal-input" />
        </label>
        <label class="contact-modal-label">
          Message
          <textarea name="message" required placeholder="Type your message..." class="contact-modal-textarea"></textarea>
        </label>
        <button type="submit" class="contact-modal-submit">Register</button>
      </form>
    </div>
  </div>
      
      
    </main>
    
  </body>
</html>
